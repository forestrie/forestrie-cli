name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Typecheck, test, binary smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      # No registry credentials are mounted anywhere in this workflow:
      # a passing install IS the tokenless-install acceptance check
      # (plan-2607-12).
      - name: Install dependencies (tokenless)
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build binary (linux-x64)
        run: bun run build:binary:linux-x64

      - name: Smoke test forestrie --help
        run: ./dist/forestrie-linux-x64 --help

      - name: Smoke test structured not-implemented errors (stub commands)
        run: |
          set -x
          run_expect_1() {
            "$@" && exit 1 || test $? -eq 1
          }
          run_expect_1 ./dist/forestrie-linux-x64 register-grant --base-url https://x --owner-log A --data-log B --sign-with k.pem --self-referential
          run_expect_1 ./dist/forestrie-linux-x64 complete-grant --grant g.b64 --checkpoint c.sth
          run_expect_1 ./dist/forestrie-linux-x64 create-receipt --massif m.log --mmr-index 0 --checkpoint c.sth

      - name: Smoke test implemented commands
        # Implemented commands: --help must render (exit 0) and a
        # bogus-input invocation must fail (any non-zero exit). verify's
        # --json failure output is additionally shape-asserted: since F3
        # (plan-2607-14 W1.3) landed, verify owns stdout with the
        # structured error envelope in EVERY failure branch.
        run: |
          set -x
          run_expect_fail() {
            "$@" && exit 1 || test $? -ne 0
          }
          ./dist/forestrie-linux-x64 deploy --help
          ./dist/forestrie-linux-x64 sign-statement --help
          ./dist/forestrie-linux-x64 register --help
          ./dist/forestrie-linux-x64 decode-receipt --help
          ./dist/forestrie-linux-x64 verify --help
          ./dist/forestrie-linux-x64 verify-grant --help
          run_expect_fail ./dist/forestrie-linux-x64 deploy --rpc-url http://localhost:8545
          run_expect_fail ./dist/forestrie-linux-x64 sign-statement --key missing.pem --payload missing.json
          run_expect_fail ./dist/forestrie-linux-x64 register --base-url https://x --log-id L --statement missing.cose --grant-b64 AAAA
          run_expect_fail ./dist/forestrie-linux-x64 decode-receipt missing.cbor
          run_expect_fail ./dist/forestrie-linux-x64 verify --genesis missing.cbor --receipt missing.cbor --payload missing.cose --entry-id 00000000000000000000000000000000
          run_expect_fail ./dist/forestrie-linux-x64 verify-grant --genesis missing.cbor --receipt missing.cbor --committed-grant AAAA
          # verify --json must emit the structured error envelope on stdout
          # (F3 closed): parseable JSON, error code + stage, non-zero exit.
          ./dist/forestrie-linux-x64 verify --json --genesis missing.cbor --receipt missing.cbor --payload missing.cose --entry-id 00000000000000000000000000000000 > verify-error.json || test $? -eq 1
          jq -e '.error == "verify_input_failed" and .command == "verify" and .stage == "input"' verify-error.json

  darwin-smoke:
    name: Darwin binary smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Install dependencies (tokenless)
        run: bun install --frozen-lockfile

      - name: Build darwin-arm64 binary
        run: bun run build:binary:darwin-arm64

      - name: Smoke test forestrie --help
        run: ./dist/forestrie-darwin-arm64 --help
